# .github/workflows/monitor.yml
# Runs daily. Loads each supported platform, injects the content script,
# sends an Arabic string, and checks if data-ymn="rtl" is applied.
# Opens a GitHub Issue on failure.

name: Platform Health Check

on:
  schedule:
    - cron: '0 8 * * *'  # Daily at 8 AM UTC
  workflow_dispatch:       # Manual trigger

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Puppeteer
        run: npm install puppeteer

      - name: Run health checks
        id: health
        run: node scripts/health-check.js
        continue-on-error: true

      - name: Open issue on failure
        if: steps.health.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body = '## Platform Health Check Failed\n\n';
            try {
              const report = fs.readFileSync('health-report.md', 'utf-8');
              body += report;
            } catch {
              body += 'Check the workflow logs for details.';
            }
            body += '\n\nThis was detected by the automated daily health check.';

            // Check if there's already an open issue
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'health-check',
              state: 'open',
            });

            if (issues.data.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `[Health Check] Platform DOM changes detected — ${new Date().toISOString().split('T')[0]}`,
                body: body,
                labels: ['health-check', 'bug'],
              });
            }
