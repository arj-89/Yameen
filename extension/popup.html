<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="utf-8">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{width:280px;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;background:#161616;color:#e0e0e0;padding:20px;direction:rtl}

.hdr{display:flex;align-items:center;gap:10px;margin-bottom:22px}
.hdr .ico{width:34px;height:34px;background:#c89b3c;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:#161616;flex-shrink:0}
.hdr h1{font-size:17px;font-weight:600;color:#fff}
.hdr .ver{font-size:11px;color:#666;margin-top:1px}

.sec{margin-bottom:16px}
.sec-label{font-size:11px;color:#666;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px;font-weight:500}

/* Segment control */
.seg{display:flex;background:#222;border-radius:8px;padding:3px;gap:2px}
.seg label{flex:1;text-align:center;cursor:pointer}
.seg input{display:none}
.seg label span{display:block;font-size:13px;padding:8px 0;border-radius:6px;color:#888;transition:all 0.15s}
.seg label:hover span{color:#ccc}
.seg input:checked+span{background:#c89b3c;color:#161616;font-weight:600}

/* Radio cards */
.cards{display:flex;flex-direction:column;gap:6px}
.card{display:flex;align-items:center;gap:10px;padding:10px 12px;background:#222;border-radius:8px;border:1.5px solid transparent;cursor:pointer;transition:all 0.15s}
.card:hover{border-color:#333}
.card.active{border-color:#c89b3c;background:#1e1c16}
.card input{display:none}
.card .radio{width:16px;height:16px;border:2px solid #555;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all 0.15s}
.card.active .radio{border-color:#c89b3c}
.card.active .radio::after{content:"";width:8px;height:8px;background:#c89b3c;border-radius:50%}
.card .txt{font-size:13px;color:#ccc}
.card.active .txt{color:#e0ddd4}

/* Toggle row */
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:#222;border-radius:8px;margin-bottom:6px}
.toggle-row .txt{font-size:13px;color:#ccc}
.toggle-row .sub{font-size:10px;color:#666;margin-top:2px}
.switch{position:relative;width:44px;height:24px;flex-shrink:0}
.switch input{opacity:0;width:0;height:0}
.slider{position:absolute;inset:0;background:#444;border-radius:12px;cursor:pointer;transition:background 0.2s}
.slider::before{content:"";position:absolute;width:18px;height:18px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:transform 0.2s}
.switch input:checked+.slider{background:#c89b3c}
.switch input:checked+.slider::before{transform:translateX(20px)}

/* Platform */
.plat{margin-top:16px;padding:8px 12px;background:#1c1c1c;border-radius:6px;display:flex;align-items:center;gap:8px}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.dot.on{background:#4ade80}.dot.off{background:#555}.dot.all{background:#c89b3c}
.plat .nm{font-size:11px;color:#777}

.ft{margin-top:14px;text-align:center;font-size:10px;color:#444}
</style>
</head>
<body>

<div class="hdr">
  <div class="ico">يـ</div>
  <div><h1>يمين</h1><div class="ver">v1.0.0</div></div>
</div>

<!-- RTL Level -->
<div class="sec">
  <div class="sec-label">مستوى RTL</div>
  <div class="seg" id="mode-seg">
    <label><input type="radio" name="mode" value="off"><span>Off</span></label>
    <label><input type="radio" name="mode" value="auto" checked><span>Auto</span></label>
    <label><input type="radio" name="mode" value="force"><span>Force</span></label>
  </div>
</div>

<!-- Numerals -->
<div class="sec">
  <div class="sec-label">نظام الأرقام</div>
  <div class="cards" id="num-cards">
    <label class="card active" data-val="western">
      <input type="radio" name="numerals" value="western" checked>
      <div class="radio"></div>
      <span class="txt">أرقام عربية: 1, 2, 3</span>
    </label>
    <label class="card" data-val="hindi">
      <input type="radio" name="numerals" value="hindi">
      <div class="radio"></div>
      <span class="txt">أرقام هندية: ١, ٢, ٣</span>
    </label>
  </div>
</div>

<!-- Any Website -->
<div class="sec">
  <div class="sec-label">النطاق</div>
  <div class="toggle-row">
    <div>
      <div class="txt">كل المواقع</div>
      <div class="sub">يعمل على أي موقع، ليس فقط المنصات المدعومة</div>
    </div>
    <label class="switch">
      <input type="checkbox" id="everywhere">
      <span class="slider"></span>
    </label>
  </div>
</div>

<div class="plat">
  <span class="dot" id="p-dot"></span>
  <span class="nm" id="p-name">—</span>
</div>

<div class="ft">يمين · صُنع للقارئ العربي</div>

<script src="popup.js"></script>
</body>
</html>
