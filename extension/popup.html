<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="utf-8">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  width:280px;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
  background:#ffffff;
  color:#334155;
  padding:20px;
  direction:rtl;
  -webkit-font-smoothing:antialiased;
}
.hdr{display:flex;align-items:center;gap:12px;margin-bottom:24px}
.hdr .ico{
  width:36px;height:36px;
  background:#4f46e5;
  border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  font-size:17px;font-weight:700;color:#fff;
  flex-shrink:0;
  box-shadow:0 2px 8px rgba(79,70,229,0.30);
}
.hdr h1{font-size:17px;font-weight:700;color:#1e3a5f}
.hdr .ver{font-size:11px;color:#94a3b8;margin-top:1px}
.sec{margin-bottom:18px}
.sec-label{
  font-size:10px;color:#94a3b8;
  text-transform:uppercase;letter-spacing:0.5px;
  margin-bottom:8px;font-weight:600;
}
.seg{
  display:flex;
  background:#ffffff;
  border:1px solid #e2e8f0;
  border-radius:12px;
  padding:3px;gap:2px;
}
.seg label{flex:1;text-align:center;cursor:pointer}
.seg input{display:none}
.seg label span{
  display:block;
  font-size:13px;font-weight:500;
  padding:8px 0;
  border-radius:9px;
  color:#94a3b8;
  transition:all 0.15s;
}
.seg label:hover span{color:#334155}
.seg input:checked+span{
  background:#4f46e5;
  color:#fff;
  font-weight:600;
  box-shadow:0 1px 6px rgba(79,70,229,0.25);
}
.cards{display:flex;flex-direction:column;gap:6px}
.card{
  display:flex;align-items:center;gap:10px;
  padding:11px 14px;
  background:#ffffff;
  border-radius:10px;
  border:1px solid #e2e8f0;
  cursor:pointer;
  transition:all 0.15s;
}
.card:hover{border-color:rgba(79,70,229,0.30)}
.card.active{
  border-color:#4f46e5;
  background:rgba(79,70,229,0.04);
}
.card input{display:none}
.card .radio{
  width:16px;height:16px;
  border:2px solid #cbd5e1;
  border-radius:50%;
  flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  transition:all 0.15s;
}
.card.active .radio{border-color:#4f46e5}
.card.active .radio::after{
  content:"";
  width:8px;height:8px;
  background:#4f46e5;
  border-radius:50%;
}
.card .txt{font-size:13px;color:#334155}
.card.active .txt{color:#1e3a5f;font-weight:500}
.toggle-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 14px;
  background:#ffffff;
  border-radius:12px;
  border:1px solid #e2e8f0;
}
.toggle-row .txt{font-size:13px;color:#334155;font-weight:500}
.toggle-row .sub{font-size:10px;color:#94a3b8;margin-top:3px;line-height:1.4}
.switch{position:relative;width:44px;height:24px;flex-shrink:0}
.switch input{opacity:0;width:0;height:0}
.slider{
  position:absolute;inset:0;
  background:#cbd5e1;
  border-radius:12px;
  cursor:pointer;
  transition:background 0.2s;
}
.slider::before{
  content:"";
  position:absolute;
  width:18px;height:18px;
  left:3px;bottom:3px;
  background:#fff;
  border-radius:50%;
  transition:transform 0.2s;
  box-shadow:0 1px 4px rgba(0,0,0,0.18);
}
.switch input:checked+.slider{background:#4f46e5}
.switch input:checked+.slider::before{transform:translateX(20px)}
.plat{
  margin-top:4px;
  padding:10px 14px;
  background:#f8fafc;
  border:1px solid #e2e8f0;
  border-radius:12px;
  display:flex;align-items:center;gap:8px;
}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.dot.on{background:#22c55e;box-shadow:0 0 0 3px rgba(34,197,94,0.15)}
.dot.off{background:#cbd5e1}
.dot.all{background:#4f46e5;box-shadow:0 0 0 3px rgba(79,70,229,0.15)}
.plat .nm{font-size:11px;color:#64748b;font-weight:500}
.ft{margin-top:16px;text-align:center;font-size:10px;color:#94a3b8;letter-spacing:0.3px}
</style>
</head>
<body>

<div class="hdr">
  <div class="ico">يـ</div>
  <div><h1>يمين</h1><div class="ver">v1.0.0</div></div>
</div>

<!-- RTL Level -->
<div class="sec">
  <div class="sec-label">مستوى RTL</div>
  <div class="seg" id="mode-seg">
    <label><input type="radio" name="mode" value="off"><span>Off</span></label>
    <label><input type="radio" name="mode" value="auto" checked><span>Auto</span></label>
    <label><input type="radio" name="mode" value="force"><span>Force</span></label>
  </div>
</div>

<!-- Numerals -->
<div class="sec">
  <div class="sec-label">نظام الأرقام</div>
  <div class="cards" id="num-cards">
    <label class="card active" data-val="western">
      <input type="radio" name="numerals" value="western" checked>
      <div class="radio"></div>
      <span class="txt">أرقام عربية: 1, 2, 3</span>
    </label>
    <label class="card" data-val="hindi">
      <input type="radio" name="numerals" value="hindi">
      <div class="radio"></div>
      <span class="txt">أرقام هندية: ١, ٢, ٣</span>
    </label>
  </div>
</div>

<!-- Any Website -->
<div class="sec">
  <div class="sec-label">النطاق</div>
  <div class="toggle-row">
    <div>
      <div class="txt">كل المواقع</div>
      <div class="sub">يعمل على أي موقع، ليس فقط المنصات المدعومة</div>
    </div>
    <label class="switch">
      <input type="checkbox" id="everywhere">
      <span class="slider"></span>
    </label>
  </div>
</div>

<div class="plat">
  <span class="dot" id="p-dot"></span>
  <span class="nm" id="p-name">—</span>
</div>

<div class="ft">يمين · صُنع للقارئ العربي</div>

<script src="popup.js"></script>
</body>
</html>
